        highlights:
          - "Built panorama stitching pipeline combining neural deblurring (fine-tuned Restormer) with SIFT and SuperPoint feature matching to handle motion-blurred images, testing on a custom dataset of 200+ image pairs."
          - "Improved feature matching inlier ratio and reduced reprojection error by 34% through fine-tuning Restormer on custom motion-blur dataset versus SIFT-only baseline."

