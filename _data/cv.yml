        highlights:
          - "Developed vision-based obstacle detection system for GPS-denied UAV flight by collecting 2,500+ annotated images, training CNN models, and deploying to embedded hardware, enabling autonomous navigation in indoor environments."
          - "Implemented camera-based visual odometry algorithms for indoor localization, iteratively testing and refining approaches like ORB-SLAM to achieve reliable position estimation under challenging real-world conditions through 10+ flight tests."
          - "Designed MPC trajectory controller for PX4-based UAV using Python and C++, integrating with ROS2 pipeline for waypoint navigation and automated testing in Gazebo simulation; used Docker, Linux, and CMake for reproducible development workflows."
          - "Validated detection models through sim-to-real testing in Gazebo and hardware flights, iterating to improve real-world performance by addressing lighting variation and motion blur."

