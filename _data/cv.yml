          - "Achieved 97.8% pathfinding success rate across 500+ trials in environments with dynamic obstacles and narrow corridors using a tuned RL policy."
          - "Integrated LiDAR and IMU sensors on TurtleBot3 hardware, calibrating sensor fusion for accurate localization and collision avoidance."

